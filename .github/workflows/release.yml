name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-notes:
    name: Read release notes
    runs-on: ubuntu-latest
    outputs:
      changes: ${{ steps.changelog.outputs.changes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Strip the leading `v` from the tag name so it matches the Keep-a-
      # Changelog heading style (`## [0.2.0]`, not `## [v0.2.0]`). The reader
      # action does not strip this for us.
      - name: Derive CHANGELOG version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Extract the section of CHANGELOG matching the tag so its contents can
      # become the release body. Fails fast (before we spend 5+ minutes on a
      # Windows build) if the tag has no entry — that's the intended forcing
      # function to keep CHANGELOG in sync with what's actually released.
      - name: Read CHANGELOG entry for this tag
        id: changelog
        uses: mindsers/changelog-reader-action@v2
        with:
          version: ${{ steps.ver.outputs.version }}
          path: ./CHANGELOG

  windows:
    name: Build, install, package (${{ matrix.linkage }}, windows-x86_64)
    runs-on: windows-latest
    needs: release-notes
    strategy:
      fail-fast: false
      matrix:
        include:
          - linkage: dynamic
            preset: windows-release-shared
          - linkage: static
            preset: windows-release-static

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # windows-latest has MinGW early on PATH, so raw cmake picks that up
      # instead of MSVC. This action exports the VS Developer env (cl.exe,
      # link.exe, rc.exe) into the remainder of the job.
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache FetchContent deps
        uses: actions/cache@v4
        with:
          path: build/${{ matrix.preset }}/_deps
          key: fetchcontent-${{ runner.os }}-${{ matrix.preset }}-${{ hashFiles('cmake/Configure*.cmake', 'CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-${{ runner.os }}-

      - name: Configure
        env:
          CC:  cl
          CXX: cl
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      # Override the preset's installDir so everything lands in a single
      # workspace-root folder that we can rename + zip in one step.
      - name: Install
        run: cmake --install build/${{ matrix.preset }} --prefix install-${{ matrix.linkage }}

      - name: Package
        shell: pwsh
        run: |
          $tag  = "${{ github.ref_name }}"
          $name = "slangmake-$tag-windows-x86_64-${{ matrix.linkage }}"
          Rename-Item -Path "install-${{ matrix.linkage }}" -NewName $name
          Compress-Archive -Path $name -DestinationPath "$name.zip"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: slangmake-windows-x86_64-${{ matrix.linkage }}
          path: slangmake-*-windows-x86_64-${{ matrix.linkage }}.zip

  publish:
    name: Upload GitHub Release
    runs-on: ubuntu-latest
    needs:
      - release-notes
      - windows

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/slangmake-*-windows-x86_64-*.zip
          # Curated CHANGELOG section first; GitHub's auto-generated notes
          # (full commit list since the previous tag) appended below.
          body: ${{ needs.release-notes.outputs.changes }}
          generate_release_notes: true
